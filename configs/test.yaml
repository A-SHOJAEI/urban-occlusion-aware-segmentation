# Test configuration for quick validation

# Paths
data:
  root_dir: "./data"
  num_classes: 19
  image_size: [128, 256]  # Smaller for testing
  use_synthetic: true

# Model configuration
model:
  type: "ensemble"
  segformer:
    backbone: "mit_b3"
    pretrained: false  # Faster without pretrained
    dropout: 0.1
  deeplabv3plus:
    backbone: "resnet101"
    pretrained: false
    output_stride: 16
  ensemble:
    weights: [0.5, 0.5]
    uncertainty_threshold: 0.3

# Training configuration
training:
  batch_size: 2
  num_epochs: 2  # Just 2 epochs for testing
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 1
  gradient_clip: 1.0
  amp: false  # Disable for testing

  early_stopping:
    patience: 10
    min_delta: 0.001

  save_dir: "./checkpoints"
  save_freq: 1
  keep_best: true

# Loss configuration
loss:
  primary: "occlusion_weighted_ce"
  auxiliary: "boundary_loss"
  weights:
    primary: 0.7
    auxiliary: 0.3
  occlusion:
    boundary_width: 5
    boundary_weight: 3.0
    edge_threshold: 0.1

# Data augmentation
augmentation:
  train:
    horizontal_flip: 0.5
    random_scale: [0.5, 2.0]
    random_crop: false  # Simpler for testing
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_rotate: 10
    gaussian_blur: 0.0
  val:
    resize: [128, 256]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# Evaluation configuration
evaluation:
  batch_size: 2
  metrics:
    - "miou"
    - "boundary_f1"
    - "occlusion_recall"
    - "pixel_accuracy"
  boundary_threshold: 5
  occlusion_classes: [11, 12, 13, 14]

# Inference configuration
inference:
  batch_size: 1
  target_fps: 15
  multi_scale: false
  flip_test: false
  output_dir: "./results"

# Logging
logging:
  log_dir: "./logs"
  log_interval: 1
  tensorboard: false
  mlflow:
    tracking_uri: "./mlruns"
    experiment_name: "test_experiment"

# System
system:
  seed: 42
  num_workers: 0
  pin_memory: false
  device: "cpu"
