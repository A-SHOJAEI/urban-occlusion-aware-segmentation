# Ablation Study Configuration: No Boundary Weighting
#
# This configuration removes the boundary-weighted loss to evaluate its impact.
# Compared to default.yaml, this uses standard cross-entropy without occlusion weighting.

# Paths
data:
  root_dir: "./data"
  num_classes: 19
  image_size: [256, 512]
  use_synthetic: true

# Model configuration (same as default)
model:
  type: "ensemble"
  segformer:
    backbone: "mit_b3"
    pretrained: true
    dropout: 0.1
  deeplabv3plus:
    backbone: "resnet101"
    pretrained: true
    output_stride: 16
  ensemble:
    weights: [0.5, 0.5]
    uncertainty_threshold: 0.3

# Training configuration (same as default)
training:
  batch_size: 2
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip: 1.0
  amp: true

  early_stopping:
    patience: 10
    min_delta: 0.001

  checkpoint:
    save_dir: "./checkpoints_ablation"
    save_freq: 5
    keep_best: true

# ABLATION: Standard cross-entropy loss without boundary weighting
loss:
  primary: "cross_entropy"  # Changed from "occlusion_weighted_ce"
  auxiliary: "boundary_loss"  # Keep auxiliary boundary loss
  weights:
    primary: 1.0  # Changed from 0.7 - use only primary loss
    auxiliary: 0.0  # Changed from 0.3 - disable auxiliary loss
  occlusion:
    boundary_width: 5
    boundary_weight: 1.0  # Changed from 3.0 - no extra weight for boundaries
    edge_threshold: 0.1

# Data augmentation (same as default)
augmentation:
  train:
    horizontal_flip: 0.5
    random_scale: [0.5, 2.0]
    random_crop: true
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
    random_rotate: 10
    gaussian_blur: 0.2
  val:
    resize: [256, 512]
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# Evaluation configuration (same as default)
evaluation:
  batch_size: 4
  metrics:
    - "miou"
    - "boundary_f1"
    - "occlusion_recall"
    - "pixel_accuracy"
  boundary_threshold: 5
  occlusion_classes: [11, 12, 13, 14]

# Inference configuration (same as default)
inference:
  batch_size: 1
  target_fps: 15
  multi_scale: false
  flip_test: false
  output_dir: "./results_ablation"

# Logging
logging:
  log_dir: "./logs_ablation"
  log_interval: 10
  tensorboard: true
  mlflow:
    tracking_uri: "./mlruns"
    experiment_name: "urban_occlusion_segmentation_ablation"

# System (same as default)
system:
  seed: 42
  num_workers: 0
  pin_memory: true
  device: "cuda"
